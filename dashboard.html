// ── SVG LOGO ───────────────────────────────────────────────────────────────────

      <path d="M130 95 L150 110 L140 125 L120 108 Z" fill="url(#lg2)" stroke="#8ab0c8" strokeWidth="1.5"/>
      <path d="M140 120 L158 112 L164 128 L148 140 L136 132 Z" fill="url(#lg2)" stroke="#8ab0c8" strokeWidth="1.5"/>
      <path d="M148 140 Q152 148 158 143 L164 128" stroke="#8ab0c8" strokeWidth="2" fill="none"/>
      <line x1="128" y1="78" x2="136" y2="100" stroke="#c8dce8" strokeWidth="2.5" strokeLinecap="round"/>
    </svg>
  );
}

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const DESTINATIONS = [
  { id: 'queretaro', label: 'Querétaro',    km: 850,  risk: 'medium', freightBase: 1100 },
  { id: 'puebla',    label: 'Puebla',       km: 960,  risk: 'medium', freightBase: 1250 },
  { id: 'cdmx',      label: 'Mexico City',  km: 1040, risk: 'high',   freightBase: 1420 },
  { id: 'qroo',      label: 'Quintana Roo', km: 1880, risk: 'high',   freightBase: 2600 },
];

// Auction price range — Japanese compact excavator hammer prices (3.5T–5.5T)
const AUCTION_PRICE_MIN             = 13000;   // USD — conservative lot
const AUCTION_PRICE_MAX             = 20000;   // USD — premium Grade 4+ unit
const OCEAN_FREIGHT_PER_CONTAINER   = 3800;    // 40'HC FCL Yokohama → Manzanillo
const CUSTOMS_RATE                  = 0.05;    // IGI 5%
const IVA_RATE                      = 0.16;    // IVA 16% (creditable for businesses)
const DTA_RATE                      = 0.00008; // DTA 0.008%
const BROKER_FEE                    = 450;     // per container
const PORT_HANDLING                 = 380;     // per container
const ESCORT_BASE                   = 2200;    // armed escort per container
const INSURANCE_RATE                = 0.012;   // 1.2% of CIF
// Target gross-margin band (after all landed costs): 32% – 41%
const MARGIN_MIN                    = 0.32;
const MARGIN_MAX                    = 0.41;

// ── RISK CONFIG (inline — no external dependency) ─────────────────────────
function getRiskStyle(risk) {
  if (risk === 'low')    return { bg: 'bg-emerald-50', border: 'border-emerald-300', text: 'text-emerald-700', dot: 'bg-emerald-500' };
  if (risk === 'medium') return { bg: 'bg-red-50',   border: 'border-red-300',   text: 'text-red-700',   dot: 'bg-red-600'   };
  return                        { bg: 'bg-red-50',     border: 'border-red-300',     text: 'text-red-700',     dot: 'bg-red-500'     };
}

// ── UTILS ──────────────────────────────────────────────────────────────────
const fmt  = (n) => '$' + Math.round(n).toLocaleString('en-US');
// fmtK intentionally suppressed — all currency shown as full numbers per brand standard
const fmtM = (n) => n >= 1000000 ? '$' + (n / 1000000).toFixed(1) + 'M' : fmt(n);

// Given landed cost per unit, compute resale price for a target gross margin
// grossMargin = (resale - landed) / resale  =>  resale = landed / (1 - margin)
const resaleForMargin = (landedPerUnit, margin) => landedPerUnit / (1 - margin);

// ── MAIN DASHBOARD ─────────────────────────────────────────────────────────
function Dashboard() {
  const [lang,          setLang]          = useState('en');
  const [containers,    setContainers]    = useState(5);
  const [excsPerCont,   setExcsPerCont]   = useState(3);
  const [destId,        setDestId]        = useState('cdmx');
  const [security,      setSecurity]      = useState('B');
  const [dropOpen,      setDropOpen]      = useState(false);
  // Auction hammer price per excavator — user-adjustable $13,000–$20,000
  const [auctionPrice,  setAuctionPrice]  = useState(16500);
  const dropRef = useRef(null);

  const t = LANG[lang];

  useEffect(() => {
    function handler(e) {
      if (dropRef.current && !dropRef.current.contains(e.target)) setDropOpen(false);
    }
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const dest          = DESTINATIONS.find(d => d.id === destId);
  const totalExcavators = containers * excsPerCont;
  const riskStyle     = getRiskStyle(dest.risk);

  const riskLabel = dest.risk === 'low' ? t.risk_low : dest.risk === 'medium' ? t.risk_medium : t.risk_high;

  // ── Helper: compute all costs for a given per-unit auction price
  const calcCosts = (pricePerUnit) => {
    const auctionTotal   = totalExcavators * pricePerUnit;
    const oceanTotal     = containers * OCEAN_FREIGHT_PER_CONTAINER;
    const cifValue       = auctionTotal + oceanTotal;
    const igi            = cifValue * CUSTOMS_RATE;
    const iva            = (cifValue + igi) * IVA_RATE;
    const dta            = cifValue * DTA_RATE;
    const brokerTotal    = BROKER_FEE * containers;
    const portTotal      = PORT_HANDLING * containers;
    const freightTotal   = dest.freightBase * containers;
    const securityCost   = security === 'A' ? ESCORT_BASE * containers : cifValue * INSURANCE_RATE;
    const totalBeforeIva = auctionTotal + oceanTotal + igi + dta + brokerTotal + portTotal + freightTotal + securityCost;
    const landedPerUnit  = totalBeforeIva / totalExcavators;
    return { auctionTotal, oceanTotal, cifValue, igi, iva, dta, brokerTotal, portTotal, freightTotal, securityCost, landedPerUnit, totalBeforeIva };
  };

  const costs = useMemo(() => calcCosts(auctionPrice),
    [auctionPrice, containers, excsPerCont, totalExcavators, dest, security]);

  // Min / Max scenario (fixed auction floor/ceiling)
  const costsMin = useMemo(() => calcCosts(AUCTION_PRICE_MIN),
    [containers, excsPerCont, totalExcavators, dest, security]);
  const costsMax = useMemo(() => calcCosts(AUCTION_PRICE_MAX),
    [containers, excsPerCont, totalExcavators, dest, security]);

  // Resale price ranges for 32%–41% gross margin on the current auction price
  const resaleMin = resaleForMargin(costs.landedPerUnit, MARGIN_MIN); // at 32% GM
  const resaleMax = resaleForMargin(costs.landedPerUnit, MARGIN_MAX); // at 41% GM
  const actualMarginAtMid = (resaleMin + resaleMax) / 2;

  // Margin % at current auction price (midpoint of band)
  const midMargin = ((resaleMax - costs.landedPerUnit) / resaleMax * 100).toFixed(1);

  // Gross profit per unit at current price and midpoint margin
  const grossProfitPerUnit = (resaleMin + resaleMax) / 2 - costs.landedPerUnit;

  return (
    <div className="min-h-screen" style={{background:'#F5F6F8'}}>

      {/* ── TOPBAR ── */}
      <div style={{background:'#F8FAFF',color:'#5A7A9A',fontSize:'.78rem',padding:'8px 0',borderBottom:'1px solid #C8D9EE'}}>
        <div style={{maxWidth:'1160px',margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}}>
          <span>Japón Compacto · Import Operations Platform</span>
          <span>Yokohama → Manzanillo → Interior MX · B2B Only</span>
        </div>
      </div>

      {/* ── NAVBAR ── */}
      <nav style={{position:'sticky',top:0,zIndex:100,background:'rgba(13,17,23,0.97)',backdropFilter:'blur(12px)',borderBottom:'1px solid #C8D9EE',padding:'0 24px'}}>
        <div style={{maxWidth:'1160px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:'68px',gap:'24px'}}>

          {/* Brand */}
          <div style={{display:'flex',alignItems:'center',gap:'10px',flexShrink:0}}>
            <div style={{width:'36px',height:'36px',background:'#1E3A5F',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'1.1rem',color:'#fff'}}>JC</div>
            <div>
              <div style={{fontSize:'1.05rem',fontWeight:800,color:'#fff',letterSpacing:'-.02em'}}>Japón<span style={{color:'#1E3A5F'}}>Compacto</span></div>
              <div style={{fontSize:'.72rem',color:'#5A7A9A',fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase'}}>Import Logistics Dashboard</div>
            </div>
          </div>

          {/* Nav right */}
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>

            {/* Select View dropdown */}
            <div ref={dropRef} style={{position:'relative'}}>
              <button
                onClick={() => setDropOpen(o => !o)}
                style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'.88rem',fontWeight:600,color:'#5A7A9A',padding:'6px 14px',borderRadius:'6px',background:'transparent',border:'none',cursor:'pointer',transition:'color .2s,background .2s'}}
                onMouseOver={e => { e.currentTarget.style.color='#fff'; e.currentTarget.style.background='#FFFFFF'; }}
                onMouseOut={e => { e.currentTarget.style.color='#5A7A9A'; e.currentTarget.style.background='transparent'; }}
              >
                {t.select_view} <span style={{fontSize:'.7rem',transition:'transform .2s',display:'inline-block',transform:dropOpen?'rotate(180deg)':'rotate(0deg)'}}>▾</span>
              </button>
              {dropOpen && (
                <div style={{position:'absolute',top:'calc(100% + 6px)',left:0,background:'#0D1B2A',border:'1px solid #C8D9EE',borderRadius:'8px',minWidth:'210px',overflow:'hidden',zIndex:200,boxShadow:'0 8px 24px rgba(0,0,0,.4)'}}>
                  <a href="index-en.html" style={{display:'block',padding:'10px 16px',fontSize:'.85rem',fontWeight:600,color:'#5A7A9A',textDecoration:'none'}}
                    onMouseOver={e=>{e.currentTarget.style.color='#fff';e.currentTarget.style.background='#FFFFFF';}}
                    onMouseOut={e=>{e.currentTarget.style.color='#5A7A9A';e.currentTarget.style.background='transparent';}}
                  >🏠 {t.home_page}</a>
                  <div style={{display:'block',padding:'10px 16px',fontSize:'.85rem',fontWeight:700,color:'#1E3A5F',background:'#F0F7FF',borderLeft:'3px solid #1E3A5F'}}>
                    📊 {t.machinery_dashboard}
                  </div>
                  <a href="consultor.html" style={{display:'block',padding:'10px 16px',fontSize:'.85rem',fontWeight:600,color:'#5A7A9A',textDecoration:'none',borderTop:'1px solid #C8D9EE'}}
                    onMouseOver={e=>{e.currentTarget.style.color='#fff';e.currentTarget.style.background='#FFFFFF';}}
                    onMouseOut={e=>{e.currentTarget.style.color='#5A7A9A';e.currentTarget.style.background='transparent';}}
                  >🔍 {t.acquisition_advisor}</a>
                </div>
              )}
            </div>

            {/* Language toggle */}
            <button
              onClick={() => setLang(l => l === 'en' ? 'es' : 'en')}
              style={{display:'inline-flex',alignItems:'center',gap:'6px',background:'rgba(200,16,46,.12)',border:'1px solid rgba(200,16,46,.3)',color:'#1E3A5F',fontSize:'.72rem',fontWeight:700,padding:'4px 12px',borderRadius:'100px',cursor:'pointer',transition:'background .2s'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(200,16,46,.22)'}
              onMouseOut={e=>e.currentTarget.style.background='rgba(200,16,46,.12)'}
            >
              {lang === 'en' ? '🇲🇽 ES' : '🇺🇸 EN'}
            </button>
          </div>
        </div>
      </nav>

      <div style={{maxWidth:'1160px',margin:'0 auto',padding:'40px 24px 64px'}}>

        {/* ── VOLATILITY DISCLAIMER ── */}
        <div style={{marginBottom:'32px',background:'#EBF4FF',border:'2px solid #1E3A5F',borderRadius:'12px',padding:'20px 24px',display:'flex',gap:'16px',alignItems:'flex-start'}}>
          <div style={{color:'#1E3A5F',fontSize:'1.4rem',flexShrink:0,marginTop:'2px'}}>⚠</div>
          <div>
            <div style={{fontWeight:700,color:'#7F1D1D',fontSize:'.8rem',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'6px'}}>{t.disclaimer_title}</div>
            <p style={{color:'#7F1D1D',fontSize:'.88rem',lineHeight:1.7}}>{t.disclaimer_body}</p>
          </div>
        </div>

        {/* ── PAGE TITLE ── */}
        <div style={{marginBottom:'32px'}}>
          <h1 style={{fontSize:'clamp(1.6rem,3vw,2.4rem)',fontWeight:800,color:'#F8FAFF',lineHeight:1.2,marginBottom:'8px'}}>{t.page_title}</h1>
          <p style={{color:'#6B7280',fontSize:'.95rem'}}>{t.page_sub}</p>
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">

          {/* ── LEFT COLUMN: INPUTS ── */}
          <div className="xl:col-span-1 space-y-5">

            {/* Container Count */}
            <div style={{background:'#fff',borderRadius:'12px',border:'1px solid #C8D9EE',padding:'24px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                <div>
                  <div style={{fontSize:'.72rem',fontWeight:700,color:'#6B7280',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'4px'}}>{t.container_count}</div>
                  <div style={{color:'#6B7280',fontSize:'.8rem'}}>{t.container_sub}</div>
                </div>
                <div style={{background:'#F8FAFF',color:'#fff',fontSize:'1.6rem',fontWeight:900,width:'56px',height:'56px',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center'}}>{containers}</div>
              </div>
              <input type="range" min="1" max="20" value={containers} onChange={e => setContainers(+e.target.value)} className="w-full"/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',color:'#9CA3AF',marginTop:'4px'}}>
                <span>1</span><span>10</span><span>20</span>
              </div>
            </div>

            {/* Excavators per Container */}
            <div style={{background:'#fff',borderRadius:'12px',border:'1px solid #C8D9EE',padding:'24px',boxShadow:'0 1px 4px rgba(0,0,0,.07)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
                <div>
                  <div style={{fontSize:'.72rem',fontWeight:700,color:'#6B7280',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'4px'}}>{t.excavators_label}</div>

              background: security==='A'?'#FDECEA':'#D4EDDA'
            }}>
              <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px'}}>
                <div style={{fontSize:'1.6rem'}}>{security==='A'?'⚠️':'✅'}</div>
                <div>
                  <div style={{fontSize:'.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'2px',color:security==='A'?'#1E3A5F':'#1D6B3B'}}>
                    {t.risk_assessment} — {security==='A'?t.elevated:t.recommended_strat}
                  </div>
                  <div style={{fontWeight:800,fontSize:'.95rem',color:security==='A'?'#7F1D1D':'#1D4733'}}>
                    {security==='A'?t.opt_a_warning_title:t.opt_b_rec_title}
                  </div>
                </div>
              </div>

              {security==='A' ? (
                <div style={{display:'flex',flexDirection:'column',gap:'10px',fontSize:'.88rem',color:'#7F1D1D',lineHeight:1.7}}>
                  <p>While armed escorts (Custodia Armada) provide a visible physical deterrent, this strategy introduces a significant and often overlooked operational risk on Mexican federal highways: <strong>high visibility actively signals to organized criminal networks that high-value cargo is in transit.</strong></p>
                  <p>Armed convoys are a well-documented target profile for cargo theft syndicates operating in Colima, Michoacán, Jalisco, and the Bajío corridors. The presence of armed personnel creates a tactical confrontation scenario that escalates the probability of coordinated interception attempts — placing both the cargo <strong>and the transport crew at direct physical risk.</strong></p>
                  <p style={{fontWeight:600,borderLeft:'3px solid #1E3A5F',paddingLeft:'12px'}}>
                    For {dest.label} ({dest.km} km, {riskLabel}): the {fmt(costs.securityCost)} escort cost does not eliminate the risk of total cargo loss — it may amplify it.
                  </p>
                </div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:'10px',fontSize:'.88rem',color:'#1D4733',lineHeight:1.7}}>
                  <p>Full cargo insurance (Seguro sobre valor total) is the <strong>strongly recommended strategy</strong> for high-value machinery imports on Mexican inland routes. This approach adopts a deliberately low-profile operational posture: standard freight carriers, no visible security markings, no armed personnel.</p>
                  <p>This strategy <strong>completely protects the imported capital value</strong> in the event of theft, accident, or force majeure, while maintaining maximum operational discretion. Insurers specializing in heavy cargo provide All-Risk coverage with rapid claims processing.</p>
                  <p style={{fontWeight:600,borderLeft:'3px solid #1D6B3B',paddingLeft:'12px'}}>
                    For {dest.label} ({dest.km} km, {riskLabel}): the {fmt(costs.securityCost)} insurance premium provides full coverage on {fmt(costs.cifValue)} CIF value — {((costs.securityCost/costs.cifValue)*100).toFixed(2)}% of total cargo value.
                  </p>
                </div>
              )}
            </div>

            {/* Route Summary */}
            <div style={{background:'#F8FAFF',borderRadius:'12px',padding:'24px',color:'#fff'}}>
              <div style={{fontSize:'.72rem',fontWeight:700,color:'#5A7A9A',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'20px'}}>{t.route_summary}</div>
              <div style={{display:'flex',alignItems:'center',marginBottom:'20px',gap:'4px'}}>
                {['🏭 Yokohama','🚢 Pacific (28d)','⚓ Manzanillo',`🚛 ${dest.label}`].map((step,i,arr) => (
                  <React.Fragment key={i}>
                    <div style={{textAlign:'center',flexShrink:0}}>
                      <div style={{fontSize:'.72rem',fontWeight:600,color:'#fff',whiteSpace:'nowrap'}}>{step}</div>
                    </div>
                    {i < arr.length-1 && <div style={{flex:1,height:'1px',background:'linear-gradient(90deg,#5A7A9A,#1E3A5F)',minWidth:'16px',margin:'0 6px'}}></div>}
                  </React.Fragment>
                ))}
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                {[
                  { label: t.containers_label,  val: containers },
                  { label: t.excavators_label2, val: totalExcavators },
                  { label: t.inland_km,         val: `${dest.km} km` },
                  { label: t.protocol,          val: security==='A'?t.armed_escort:t.insurance },
                ].map((item,i) => (
                  <div key={i} style={{background:'#FFFFFF',borderRadius:'8px',padding:'12px'}}>
                    <div style={{fontSize:'.68rem',color:'#5A7A9A',marginBottom:'4px'}}>{item.label}</div>
                    <div style={{fontWeight:700,color:'#fff'}}>{item.val}</div>
                  </div>
                ))}
              </div>

              {/* Top Model Performance Cards */}
              <div style={{marginTop:'20px',paddingTop:'20px',borderTop:'1px solid #C8D9EE'}}>
                <div style={{fontSize:'.68rem',fontWeight:700,color:'#5A7A9A',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:'14px'}}>
                  {lang==='en' ? '🏆 Top Margin Models — Current Auction Price' : '🏆 Modelos de Mayor Margen — Precio Actual de Subasta'}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {[
                    { model:'Kubota KX155-5',    type:'5.5T Compact Excavator', margin: 0.41, note: lang==='en'?'Highest demand · fastest resale':'Mayor demanda · reventa más rápida' },
                    { model:'Komatsu PC45MR-5',  type:'4.5T Zero-Tail-Swing',   margin: 0.38, note: lang==='en'?'Urban sites premium · ZTS':'Prima sitios urbanos · ZTS' },
                    { model:'Cat 305E2 CR',       type:'5.0T Compact Radius',    margin: 0.34, note: lang==='en'?'Cat brand premium in MX':'Prima marca Cat en MX' },
                  ].map((m,i) => {
                    const landed = costs.landedPerUnit;
                    const resale = resaleForMargin(landed, m.margin);
                    const profit = resale - landed;
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#FFFFFF',borderRadius:'8px',padding:'12px 14px',gap:'8px',flexWrap:'wrap'}}>
                        <div style={{flex:1,minWidth:'140px'}}>
                          <div style={{fontWeight:800,color:'#fff',fontSize:'.88rem'}}>{m.model}</div>
                          <div style={{fontSize:'.7rem',color:'#5A7A9A',marginTop:'2px'}}>{m.type} · {m.note}</div>
                        </div>
                        <div style={{display:'flex',gap:'12px',alignItems:'center',flexShrink:0}}>
                          <div style={{textAlign:'right'}}>
                            <div style={{fontSize:'.66rem',color:'#5A7A9A',marginBottom:'2px'}}>{lang==='en'?'Resale':'Reventa'}</div>
                            <div style={{fontWeight:800,color:'#fff',fontSize:'.9rem'}}>{fmt(resale)}</div>
                          </div>
                          <div style={{background:'#F8FAFF',borderRadius:'6px',padding:'6px 12px',textAlign:'center',minWidth:'70px'}}>
                            <div style={{fontSize:'1rem',fontWeight:900,color:'#4ADE80'}}>+{fmt(profit)}</div>
                            <div style={{fontSize:'.65rem',color:'#5A7A9A',fontWeight:700,marginTop:'2px'}}>
                              {(m.margin * 100).toFixed(0)}% GM
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

          </div>{/* /right col */}
        </div>{/* /grid */}

        {/* ── FOOTER ── */}
        <div style={{marginTop:'48px',paddingTop:'24px',borderTop:'1px solid #C8D9EE',display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:'12px',fontSize:'.78rem',color:'#9CA3AF'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <Logo size={24}/>
            <span style={{fontWeight:600,color:'#1E3A5F'}}>Japón Compacto</span>
            <span>· {t.footer_platform}</span>
          </div>
          <div style={{display:'flex',gap:'24px'}}>
            <span>📧 contacto@japoncompacto.com</span>
            <span>📱 +1 587 723 6646</span>
            <span>🏢 Monterrey, Nuevo León</span>
          </div>
        </div>

      </div>{/* /max-width container */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
